<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 0 auto; padding: 2rem; }
        form { background: #f5f5f5; padding: 2rem; border-radius: 5px; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
        button { background: #667eea; color: white; padding: 1rem; width: 100%; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="/">← Back</a>
    <h1>Application Form</h1>
    <form onsubmit="alert('Thank you!'); window.location='/success'; return false;">
        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>
        <input type="email" placeholder="Email" required>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
